<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaTools JSON 编辑器</title>
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="./vendor/monaco/vs/editor/editor.main.css">
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f6fa;
            --surface: #ffffff;
            --surface-soft: #f8fbff;
            --line: rgba(28, 47, 67, 0.12);
            --text: #162433;
            --muted: #627487;
            --accent: #1968ab;
            --accent-soft: rgba(25, 104, 171, 0.12);
            --success: #22724c;
            --danger: #ac4c45;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font: 14px/1.5 "IBM Plex Sans", "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif;
            overflow: hidden;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        button {
            border: 0;
            background: transparent;
            cursor: pointer;
        }

        .app {
            height: 100%;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            background: var(--surface-soft);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--line);
            background: var(--surface);
        }

        .title {
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .toolbar button,
        .panel-actions button,
        .panel-head button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 0 12px;
            border: 1px solid var(--line);
            color: var(--text);
            background: var(--surface);
        }

        .toolbar button.primary,
        .panel-actions button.primary {
            border-color: rgba(25, 104, 171, 0.16);
            background: var(--accent);
            color: #fff;
        }

        .toolbar button.ghost,
        .panel-actions button.ghost {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: transparent;
        }

        .workspace {
            position: relative;
            min-height: 0;
            overflow: hidden;
            background: var(--surface-soft);
        }

        #editor-container {
            width: 100%;
            height: 100%;
        }

        .path-panel {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: min(360px, calc(100vw - 56px));
            display: grid;
            grid-template-rows: auto auto auto minmax(0, 1fr);
            gap: 12px;
            padding: 14px;
            background: var(--surface);
            border-left: 1px solid var(--line);
            transition: transform 160ms ease, opacity 160ms ease;
        }

        .path-panel.collapsed {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .panel-title {
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field-label {
            color: var(--muted);
            font-size: 12px;
        }

        .row {
            display: flex;
            gap: 8px;
        }

        .row input {
            min-width: 0;
            flex: 1;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            outline: none;
            padding: 10px 12px;
            background: var(--surface-soft);
            color: var(--text);
            font: 12px/1.6 "JetBrains Mono", "SFMono-Regular", "SF Mono", "Consolas", monospace;
        }

        textarea {
            resize: none;
        }

        #path-input {
            min-height: 120px;
        }

        #extract-output {
            min-height: 0;
            height: 100%;
        }

        .panel-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            border-top: 1px solid var(--line);
            background: var(--surface);
        }

        .status-pill {
            min-height: 22px;
            color: var(--muted);
        }

        .status-pill.success {
            color: var(--success);
        }

        .status-pill.error {
            color: var(--danger);
        }

        .toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            padding: 10px 14px;
            background: rgba(22, 36, 51, 0.94);
            color: #fff;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 120ms ease, transform 120ms ease;
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 980px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .toolbar {
                justify-content: flex-start;
            }

            .path-panel {
                top: auto;
                left: 0;
                right: 0;
                width: auto;
                max-height: 52vh;
                border-left: 0;
                border-top: 1px solid var(--line);
            }

            .path-panel.collapsed {
                transform: translateY(100%);
            }
        }
    </style>
</head>
<body>
<main class="app">
    <header class="topbar">
        <div class="title">JSON</div>

        <div class="toolbar">
            <button id="toggle-panel-button" type="button">Path</button>
            <button id="format-button" class="primary" type="button">格式化</button>
            <button id="compress-button" type="button">压缩</button>
            <button id="parse-query-button" type="button">Parse</button>
            <button id="query-button" type="button">Query</button>
            <button id="copy-button" class="ghost" type="button">复制</button>
            <button id="clear-button" type="button">清空</button>
        </div>
    </header>

    <section class="workspace">
        <div id="editor-container"></div>

        <aside id="path-panel" class="path-panel collapsed">
            <div class="panel-head">
                <div class="panel-title">Path</div>
                <button id="close-panel-button" type="button">关闭</button>
            </div>

            <div class="field">
                <div class="field-label">当前</div>
                <div class="row">
                    <input id="current-path" type="text" readonly>
                    <button id="copy-path-button" class="ghost" type="button">复制</button>
                    <button id="use-path-button" type="button">带入</button>
                </div>
            </div>

            <div class="field">
                <div class="field-label">路径</div>
                <textarea id="path-input" spellcheck="false"></textarea>
                <div class="panel-actions">
                    <button id="extract-button" class="primary" type="button">提取</button>
                    <button id="build-query-button" type="button">Query</button>
                    <button id="copy-output-button" class="ghost" type="button">复制结果</button>
                    <button id="clear-output-button" type="button">清空</button>
                </div>
            </div>

            <textarea id="extract-output" spellcheck="false" readonly></textarea>
        </aside>
    </section>

    <footer class="status-bar">
        <div id="status-pill" class="status-pill">加载中</div>
    </footer>
</main>

<div id="toast" class="toast"></div>

<script src="./vendor/monaco/vs/loader.js"></script>
<script type="module">
    const triggers = ["json", "url2params", "query2params", "qs2params"];

    const editorContainer = document.getElementById("editor-container");
    const pathPanel = document.getElementById("path-panel");
    const statusPill = document.getElementById("status-pill");
    const toastNode = document.getElementById("toast");
    const currentPathInput = document.getElementById("current-path");
    const pathInput = document.getElementById("path-input");
    const extractOutput = document.getElementById("extract-output");

    const togglePanelButton = document.getElementById("toggle-panel-button");
    const closePanelButton = document.getElementById("close-panel-button");
    const formatButton = document.getElementById("format-button");
    const compressButton = document.getElementById("compress-button");
    const parseQueryButton = document.getElementById("parse-query-button");
    const queryButton = document.getElementById("query-button");
    const copyButton = document.getElementById("copy-button");
    const clearButton = document.getElementById("clear-button");
    const copyPathButton = document.getElementById("copy-path-button");
    const usePathButton = document.getElementById("use-path-button");
    const extractButton = document.getElementById("extract-button");
    const buildQueryButton = document.getElementById("build-query-button");
    const copyOutputButton = document.getElementById("copy-output-button");
    const clearOutputButton = document.getElementById("clear-output-button");

    const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const orderedTriggers = [...triggers].sort((a, b) => b.length - a.length);
    const triggerPrefixPattern = new RegExp(`^(?:${orderedTriggers.map(escapeRegExp).join("|")})(?:\\s+|$)`, "i");

    const state = {
        editor: null,
        monaco: null,
        validateTimer: 0,
        toastTimer: 0,
        previewCollapsed: true,
        isValid: false,
        parsedValue: undefined,
        parsedTree: null,
        currentPath: "",
    };

    const keyboard = {
        primaryPressed: (event) => event.ctrlKey || event.metaKey,
        match: (event, key, modifiers = {}) => {
            if (event.key.toLowerCase() !== key.toLowerCase()) {
                return false;
            }
            const primaryPressed = keyboard.primaryPressed(event);
            if (modifiers.primary === true && !primaryPressed) {
                return false;
            }
            if (modifiers.primary === false && primaryPressed) {
                return false;
            }
            if (modifiers.shift !== undefined && modifiers.shift !== event.shiftKey) {
                return false;
            }
            if (modifiers.alt !== undefined && modifiers.alt !== event.altKey) {
                return false;
            }
            return true;
        }
    };

    const showToast = (message) => {
        toastNode.textContent = message;
        toastNode.classList.add("visible");
        window.clearTimeout(state.toastTimer);
        state.toastTimer = window.setTimeout(() => {
            toastNode.classList.remove("visible");
        }, 1800);
    };

    const setStatus = (message, type = "info") => {
        statusPill.textContent = message || "";
        statusPill.className = type === "error"
            ? "status-pill error"
            : type === "success"
                ? "status-pill success"
                : "status-pill";
    };

    const normalizeLineEndings = (value) => String(value || "").replace(/\r\n?/g, "\n");

    const writeClipboardText = async (value) => {
        if (window.runtime?.ClipboardSetText) {
            await window.runtime.ClipboardSetText(value);
            return;
        }
        if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(value);
            return;
        }
        throw new Error("当前环境不支持文本复制");
    };

    const getEditorValue = () => state.editor ? state.editor.getValue() : "";

    const getModel = () => state.editor ? state.editor.getModel() : null;

    const focusEditor = () => {
        state.editor?.focus();
    };

    const replaceEditorValue = (value) => {
        const model = getModel();
        if (!model || !state.editor) {
            return;
        }
        state.editor.pushUndoStop();
        state.editor.executeEdits("watools-json-editor", [{
            range: model.getFullModelRange(),
            text: normalizeLineEndings(value),
            forceMoveMarkers: true,
        }]);
        state.editor.pushUndoStop();
    };

    const updateActionState = () => {
        const hasText = getEditorValue().trim().length > 0;
        formatButton.disabled = !state.editor || !hasText;
        compressButton.disabled = !state.editor || !state.isValid;
        parseQueryButton.disabled = !hasText;
        queryButton.disabled = !state.isValid;
        copyButton.disabled = !hasText;
        clearButton.disabled = !state.editor || !hasText;
        copyPathButton.disabled = !state.currentPath;
        usePathButton.disabled = !state.currentPath;
        extractButton.disabled = !state.isValid;
        buildQueryButton.disabled = !state.isValid;
        copyOutputButton.disabled = !extractOutput.value.trim();
        clearOutputButton.disabled = !pathInput.value.trim() && !extractOutput.value.trim();
    };

    const togglePanel = (force) => {
        if (typeof force === "boolean") {
            state.previewCollapsed = !force;
        } else {
            state.previewCollapsed = !state.previewCollapsed;
        }
        pathPanel.classList.toggle("collapsed", state.previewCollapsed);
        togglePanelButton.textContent = state.previewCollapsed ? "Path" : "隐藏";
    };

    const clearPathState = () => {
        state.currentPath = "";
        currentPathInput.value = "";
        updateActionState();
    };

    const formatPathSegment = (parentPath, key, isArrayItem) => {
        if (isArrayItem) {
            return `${parentPath}[${key}]`;
        }
        if (/^[A-Za-z_$][A-Za-z0-9_$]*$/.test(key)) {
            return `${parentPath}.${key}`;
        }
        return `${parentPath}[${JSON.stringify(key)}]`;
    };

    class JsonTreeParser {
        constructor(text) {
            this.text = text;
            this.index = 0;
            this.length = text.length;
        }

        parse() {
            this.skipWhitespace();
            const node = this.parseValue("$");
            this.skipWhitespace();
            if (this.index !== this.length) {
                this.error("Unexpected token");
            }
            return node;
        }

        parseValue(path, rangeStart) {
            this.skipWhitespace();
            const actualStart = this.index;
            const start = typeof rangeStart === "number" ? rangeStart : actualStart;
            const char = this.text[this.index];

            if (char === "{") {
                return this.parseObject(path, start);
            }
            if (char === "[") {
                return this.parseArray(path, start);
            }
            if (char === "\"") {
                const value = this.parseStringLiteral();
                return {path, start, end: this.index, value, children: []};
            }
            if (char === "-" || /[0-9]/.test(char)) {
                const value = this.parseNumberLiteral();
                return {path, start, end: this.index, value, children: []};
            }
            if (this.text.startsWith("true", this.index)) {
                this.index += 4;
                return {path, start, end: this.index, value: true, children: []};
            }
            if (this.text.startsWith("false", this.index)) {
                this.index += 5;
                return {path, start, end: this.index, value: false, children: []};
            }
            if (this.text.startsWith("null", this.index)) {
                this.index += 4;
                return {path, start, end: this.index, value: null, children: []};
            }

            this.error("Unexpected token");
        }

        parseObject(path, start) {
            const children = [];
            const value = {};
            this.expect("{");
            this.skipWhitespace();

            if (this.peek() === "}") {
                this.index += 1;
                return {path, start, end: this.index, value, children};
            }

            while (this.index < this.length) {
                this.skipWhitespace();
                const keyStart = this.index;
                const key = this.parseStringLiteral();
                this.skipWhitespace();
                this.expect(":");
                const child = this.parseValue(formatPathSegment(path, key, false), keyStart);
                value[key] = child.value;
                children.push(child);
                this.skipWhitespace();

                const next = this.peek();
                if (next === ",") {
                    this.index += 1;
                    continue;
                }
                if (next === "}") {
                    this.index += 1;
                    break;
                }
                this.error("Unexpected token");
            }

            return {path, start, end: this.index, value, children};
        }

        parseArray(path, start) {
            const children = [];
            const value = [];
            this.expect("[");
            this.skipWhitespace();

            if (this.peek() === "]") {
                this.index += 1;
                return {path, start, end: this.index, value, children};
            }

            let itemIndex = 0;
            while (this.index < this.length) {
                const child = this.parseValue(formatPathSegment(path, String(itemIndex), true));
                value.push(child.value);
                children.push(child);
                itemIndex += 1;
                this.skipWhitespace();

                const next = this.peek();
                if (next === ",") {
                    this.index += 1;
                    continue;
                }
                if (next === "]") {
                    this.index += 1;
                    break;
                }
                this.error("Unexpected token");
            }

            return {path, start, end: this.index, value, children};
        }

        parseStringLiteral() {
            const quote = this.peek();
            if (quote !== "\"") {
                this.error("Expected string");
            }
            this.index += 1;
            let result = "";

            while (this.index < this.length) {
                const char = this.text[this.index];
                if (char === "\"") {
                    this.index += 1;
                    return result;
                }
                if (char === "\\") {
                    this.index += 1;
                    const escaped = this.text[this.index];
                    if (escaped === "\"" || escaped === "\\" || escaped === "/") {
                        result += escaped;
                    } else if (escaped === "b") {
                        result += "\b";
                    } else if (escaped === "f") {
                        result += "\f";
                    } else if (escaped === "n") {
                        result += "\n";
                    } else if (escaped === "r") {
                        result += "\r";
                    } else if (escaped === "t") {
                        result += "\t";
                    } else if (escaped === "u") {
                        const hex = this.text.slice(this.index + 1, this.index + 5);
                        if (!/^[0-9a-fA-F]{4}$/.test(hex)) {
                            this.error("Invalid unicode escape");
                        }
                        result += String.fromCharCode(parseInt(hex, 16));
                        this.index += 4;
                    } else {
                        this.error("Invalid escape");
                    }
                    this.index += 1;
                    continue;
                }
                result += char;
                this.index += 1;
            }

            this.error("Unterminated string");
        }

        parseNumberLiteral() {
            const source = this.text.slice(this.index);
            const match = source.match(/^-?(?:0|[1-9]\d*)(?:\.\d+)?(?:[eE][+-]?\d+)?/);
            if (!match) {
                this.error("Invalid number");
            }
            this.index += match[0].length;
            return Number(match[0]);
        }

        skipWhitespace() {
            while (this.index < this.length && /\s/.test(this.text[this.index])) {
                this.index += 1;
            }
        }

        expect(char) {
            if (this.text[this.index] !== char) {
                this.error(`Expected ${char}`);
            }
            this.index += 1;
        }

        peek() {
            return this.text[this.index];
        }

        error(message) {
            throw new Error(message);
        }
    }

    const findDeepestNodeAtOffset = (node, offset) => {
        if (!node || offset < node.start || offset > node.end) {
            return null;
        }
        for (const child of node.children || []) {
            const match = findDeepestNodeAtOffset(child, offset);
            if (match) {
                return match;
            }
        }
        return node;
    };

    const updateCurrentPathFromCursor = () => {
        if (!state.editor || !state.parsedTree || !state.isValid) {
            clearPathState();
            return;
        }

        const model = getModel();
        const position = state.editor.getPosition();
        if (!model || !position) {
            clearPathState();
            return;
        }

        const offset = model.getOffsetAt(position);
        const node = findDeepestNodeAtOffset(state.parsedTree, offset)
            || (offset > 0 ? findDeepestNodeAtOffset(state.parsedTree, offset - 1) : null)
            || state.parsedTree;

        state.currentPath = node?.path || "";
        currentPathInput.value = state.currentPath;
        updateActionState();
    };

    const parseJsonText = (value) => {
        const source = normalizeLineEndings(value);
        const trimmed = source.trim();
        if (!trimmed) {
            return {ok: false, error: "请输入 JSON。"};
        }

        try {
            const leadingOffset = source.length - source.trimStart().length;
            const tree = new JsonTreeParser(trimmed).parse();
            const shiftTreeOffset = (node, delta) => {
                node.start += delta;
                node.end += delta;
                (node.children || []).forEach((child) => shiftTreeOffset(child, delta));
            };
            shiftTreeOffset(tree, leadingOffset);
            return {
                ok: true,
                tree,
                value: tree.value,
            };
        } catch (error) {
            try {
                JSON.parse(trimmed);
                return {ok: false, error: error instanceof Error ? error.message : "JSON 解析失败"};
            } catch (jsonError) {
                const message = jsonError instanceof Error ? jsonError.message : "JSON 解析失败";
                const positionMatch = message.match(/position\s+(\d+)/i);
                if (!positionMatch) {
                    return {ok: false, error: message};
                }
                const position = Number(positionMatch[1]);
                const prefix = trimmed.slice(0, position);
                const lines = prefix.split("\n");
                const line = lines.length;
                const column = lines[lines.length - 1].length + 1;
                return {ok: false, error: `${message}（第 ${line} 行，第 ${column} 列）`};
            }
        }
    };

    const smartDecode = (value) => {
        let current = String(value ?? "");
        for (let i = 0; i < 2; i += 1) {
            if (!/%[0-9a-fA-F]{2}/.test(current)) {
                break;
            }
            try {
                const decoded = decodeURIComponent(current);
                if (decoded === current) {
                    break;
                }
                current = decoded;
            } catch (error) {
                break;
            }
        }
        return current;
    };

    const normalizeParamValue = (value) => {
        const decoded = smartDecode(value);
        const trimmed = decoded.trim();
        if (
            (trimmed.startsWith("{") && trimmed.endsWith("}"))
            || (trimmed.startsWith("[") && trimmed.endsWith("]"))
            || trimmed === "true"
            || trimmed === "false"
            || trimmed === "null"
            || /^-?(?:0|[1-9]\d*)(?:\.\d+)?(?:[eE][+-]?\d+)?$/.test(trimmed)
            || ((trimmed.startsWith("\"") && trimmed.endsWith("\"")) || (trimmed.startsWith("'") && trimmed.endsWith("'")))
        ) {
            try {
                if (trimmed.startsWith("'") && trimmed.endsWith("'")) {
                    return JSON.parse(`"${trimmed.slice(1, -1).replace(/\\/g, "\\\\").replace(/"/g, '\\"')}"`);
                }
                return JSON.parse(trimmed);
            } catch (error) {
                return decoded;
            }
        }
        return decoded;
    };

    const appendQueryParam = (target, key, value) => {
        if (!(key in target)) {
            target[key] = value;
            return;
        }
        if (Array.isArray(target[key])) {
            target[key].push(value);
            return;
        }
        target[key] = [target[key], value];
    };

    const parseQueryCandidate = (input) => {
        let candidate = input.trim();
        if (!candidate) {
            return null;
        }

        try {
            const url = new URL(candidate);
            if ([...url.searchParams.keys()].length > 0) {
                const result = {};
                for (const [key, value] of url.searchParams.entries()) {
                    appendQueryParam(result, smartDecode(key), normalizeParamValue(value));
                }
                return result;
            }
        } catch (error) {
            // ignore
        }

        const questionIndex = candidate.indexOf("?");
        if (questionIndex >= 0) {
            candidate = candidate.slice(questionIndex + 1);
        }
        const hashIndex = candidate.indexOf("#");
        if (hashIndex >= 0) {
            candidate = candidate.slice(0, hashIndex);
        }
        candidate = candidate.replace(/^\?/, "");
        if (!candidate || !/[=&]/.test(candidate)) {
            return null;
        }

        const params = new URLSearchParams(candidate);
        const result = {};
        let hasEntries = false;
        for (const [key, value] of params.entries()) {
            hasEntries = true;
            appendQueryParam(result, smartDecode(key), normalizeParamValue(value));
        }
        return hasEntries ? result : null;
    };

    const convertUrlParamsInput = (input) => {
        const trimmed = input.trim();
        if (!trimmed) {
            return null;
        }

        const candidates = [trimmed];
        const once = smartDecode(trimmed);
        if (once !== trimmed) {
            candidates.push(once);
        }
        const twice = smartDecode(once);
        if (twice !== once) {
            candidates.push(twice);
        }

        for (const candidate of candidates) {
            const parsed = parseQueryCandidate(candidate);
            if (parsed) {
                return parsed;
            }
        }
        return null;
    };

    const appendQueryPair = (params, key, value) => {
        if (value === undefined) {
            return;
        }
        if (value === null) {
            params.append(key, "null");
            return;
        }
        if (Array.isArray(value)) {
            value.forEach((item) => {
                if (item !== null && typeof item === "object") {
                    params.append(key, JSON.stringify(item));
                    return;
                }
                params.append(key, typeof item === "string" ? item : JSON.stringify(item));
            });
            return;
        }
        if (typeof value === "object") {
            params.append(key, JSON.stringify(value));
            return;
        }
        params.append(key, typeof value === "string" ? value : JSON.stringify(value));
    };

    const buildQueryStringFromJson = (rootValue) => {
        if (!rootValue || typeof rootValue !== "object" || Array.isArray(rootValue)) {
            throw new Error("根节点必须是对象");
        }

        const params = new URLSearchParams();
        Object.entries(rootValue).forEach(([key, value]) => {
            appendQueryPair(params, key, value);
        });
        return params.toString();
    };

    const parseCommandInput = (value) => {
        const trimmed = normalizeLineEndings(value).trim();
        if (!trimmed) {
            return {trigger: "", payload: ""};
        }

        const match = trimmed.match(/^([a-zA-Z0-9_-]+)(?:\s+([\s\S]*))?$/);
        if (!match) {
            return {trigger: "", payload: trimmed};
        }

        const trigger = match[1].toLowerCase();
        const payload = typeof match[2] === "string" ? match[2].trim() : "";
        return {trigger, payload};
    };

    const readHostContext = () => window.pluginContext || {
        input: {
            value: typeof window.inputValue === "string" ? window.inputValue : "",
            valueType: "text",
            clipboardContentType: undefined,
        },
        clipboard: null,
    };

    const extractCommandSeed = (context) => {
        const searchSeed = new URLSearchParams(window.location.search).get("seed");
        const seedValue = typeof searchSeed === "string" && searchSeed.trim()
            ? searchSeed
            : typeof context?.input?.value === "string" && context.input.value.trim()
                ? context.input.value
                : typeof window.inputValue === "string"
                    ? window.inputValue
                    : "";
        return parseCommandInput(seedValue);
    };

    const shouldAutoFormatJsonText = (value) => {
        const trimmed = normalizeLineEndings(value).trim();
        if (!trimmed) {
            return false;
        }
        return (trimmed.startsWith("{") && trimmed.endsWith("}"))
            || (trimmed.startsWith("[") && trimmed.endsWith("]"));
    };

    const renderValidation = () => {
        const rawText = normalizeLineEndings(getEditorValue());
        if (!rawText.trim()) {
            state.isValid = false;
            state.parsedValue = undefined;
            state.parsedTree = null;
            extractOutput.value = "";
            clearPathState();
            setStatus("");
            updateActionState();
            return;
        }

        const parsed = parseJsonText(rawText);
        if (!parsed.ok) {
            state.isValid = false;
            state.parsedValue = undefined;
            state.parsedTree = null;
            extractOutput.value = "";
            clearPathState();
            setStatus("JSON 无效", "error");
            updateActionState();
            return;
        }

        state.isValid = true;
        state.parsedValue = parsed.value;
        state.parsedTree = parsed.tree;
        setStatus("");
        updateCurrentPathFromCursor();
        updateActionState();
    };

    const validateNow = () => {
        window.clearTimeout(state.validateTimer);
        renderValidation();
    };

    const scheduleValidate = () => {
        window.clearTimeout(state.validateTimer);
        state.validateTimer = window.setTimeout(() => {
            renderValidation();
        }, 120);
    };

    const formatCurrentJson = async () => {
        if (!state.editor) {
            throw new Error("编辑器尚未完成初始化。");
        }
        if (!state.isValid) {
            throw new Error("当前内容不是有效 JSON。");
        }
        await state.editor.getAction("editor.action.formatDocument").run();
        validateNow();
        setStatus("已格式化", "success");
    };

    const compressCurrentJson = () => {
        if (!state.isValid) {
            throw new Error("当前内容不是有效 JSON。");
        }
        replaceEditorValue(JSON.stringify(state.parsedValue));
        validateNow();
        setStatus("已压缩", "success");
    };

    const copyEditorJson = async () => {
        const text = state.isValid
            ? JSON.stringify(state.parsedValue, null, 2)
            : getEditorValue();
        if (!text.trim()) {
            throw new Error("没有可复制内容。");
        }
        await writeClipboardText(text);
        setStatus("已复制", "success");
        showToast("已复制");
    };

    const decodeQuotedPathValue = (raw, quote) => {
        let result = "";
        for (let index = 0; index < raw.length; index += 1) {
            const char = raw[index];
            if (char !== "\\") {
                result += char;
                continue;
            }

            index += 1;
            const escaped = raw[index];
            if (escaped === undefined) {
                throw new Error("无效 Path");
            }
            if (escaped === quote || escaped === "\\" || escaped === "/") {
                result += escaped;
                continue;
            }
            if (escaped === "b") {
                result += "\b";
                continue;
            }
            if (escaped === "f") {
                result += "\f";
                continue;
            }
            if (escaped === "n") {
                result += "\n";
                continue;
            }
            if (escaped === "r") {
                result += "\r";
                continue;
            }
            if (escaped === "t") {
                result += "\t";
                continue;
            }
            if (escaped === "u") {
                const hex = raw.slice(index + 1, index + 5);
                if (!/^[0-9a-fA-F]{4}$/.test(hex)) {
                    throw new Error("无效 Path");
                }
                result += String.fromCharCode(parseInt(hex, 16));
                index += 4;
                continue;
            }
            result += escaped;
        }
        return result;
    };

    const parsePathExpression = (expression) => {
        const input = expression.trim();
        if (!input) {
            return [];
        }
        if (input === "$") {
            return [];
        }
        if (!input.startsWith("$")) {
            throw new Error("Path 必须以 $ 开头");
        }

        const segments = [];
        let index = 1;

        while (index < input.length) {
            const char = input[index];
            if (char === ".") {
                index += 1;
                let start = index;
                while (index < input.length && /[A-Za-z0-9_$]/.test(input[index])) {
                    index += 1;
                }
                if (start === index) {
                    throw new Error("无效 Path");
                }
                segments.push(input.slice(start, index));
                continue;
            }

            if (char === "[") {
                index += 1;
                if (input[index] === "\"" || input[index] === "'") {
                    const quote = input[index];
                    index += 1;
                    let raw = "";
                    while (index < input.length) {
                        const current = input[index];
                        if (current === "\\") {
                            raw += current + input[index + 1];
                            index += 2;
                            continue;
                        }
                        if (current === quote) {
                            break;
                        }
                        raw += current;
                        index += 1;
                    }
                    if (input[index] !== quote) {
                        throw new Error("无效 Path");
                    }
                    segments.push(decodeQuotedPathValue(raw, quote));
                    index += 1;
                    if (input[index] !== "]") {
                        throw new Error("无效 Path");
                    }
                    index += 1;
                    continue;
                }

                let start = index;
                while (index < input.length && /[0-9]/.test(input[index])) {
                    index += 1;
                }
                if (start === index || input[index] !== "]") {
                    throw new Error("无效 Path");
                }
                segments.push(Number(input.slice(start, index)));
                index += 1;
                continue;
            }

            throw new Error("无效 Path");
        }

        return segments;
    };

    const lookupValueByPath = (rootValue, expression) => {
        const segments = parsePathExpression(expression);
        let current = rootValue;

        for (const segment of segments) {
            if (Array.isArray(current) && typeof segment === "number") {
                if (segment < 0 || segment >= current.length) {
                    return {found: false};
                }
                current = current[segment];
                continue;
            }
            if (current && typeof current === "object" && Object.prototype.hasOwnProperty.call(current, segment)) {
                current = current[segment];
                continue;
            }
            return {found: false};
        }

        return {found: true, value: current};
    };

    const describeExtractedValue = (value) => {
        return typeof value === "string" ? value : JSON.stringify(value, null, 2);
    };

    const runExtraction = () => {
        if (!state.isValid) {
            throw new Error("当前内容不是有效 JSON。");
        }

        const lines = pathInput.value
            .split(/\r?\n/)
            .map((line) => line.trim())
            .filter(Boolean);

        if (!lines.length) {
            throw new Error("请输入 Path。");
        }

        if (lines.length === 1) {
            const result = lookupValueByPath(state.parsedValue, lines[0]);
            if (!result.found) {
                extractOutput.value = "";
                setStatus("未找到", "error");
                updateActionState();
                return;
            }
            extractOutput.value = describeExtractedValue(result.value);
            setStatus("已提取", "success");
            updateActionState();
            return;
        }

        const output = lines.map((line) => {
            try {
                const result = lookupValueByPath(state.parsedValue, line);
                return result.found
                    ? {path: line, value: result.value}
                    : {path: line, error: "not found"};
            } catch (error) {
                return {path: line, error: error instanceof Error ? error.message : "invalid path"};
            }
        });

        extractOutput.value = JSON.stringify(output, null, 2);
        setStatus("已提取", "success");
        updateActionState();
    };

    const runBuildQuery = () => {
        if (!state.isValid) {
            throw new Error("当前内容不是有效 JSON。");
        }
        const query = buildQueryStringFromJson(state.parsedValue);
        extractOutput.value = query;
        setStatus("已生成", "success");
        updateActionState();
    };

    const runParseCurrentEditorAsParams = () => {
        const current = getEditorValue().trim();
        if (!current) {
            throw new Error("没有可解析内容。");
        }
        const converted = convertUrlParamsInput(current);
        if (!converted) {
            throw new Error("未识别为 URL 或 query string。");
        }
        replaceEditorValue(JSON.stringify(converted, null, 2));
        validateNow();
        setStatus("已转换", "success");
    };

    const applyHostContext = (context) => {
        if (!state.editor) {
            return;
        }

        const {trigger, payload} = extractCommandSeed(context);
        if (!trigger || !payload) {
            validateNow();
            return;
        }

        if (trigger === "url2params") {
            const converted = convertUrlParamsInput(payload);
            if (converted) {
                replaceEditorValue(JSON.stringify(converted, null, 2));
                validateNow();
                setStatus("已转换", "success");
                focusEditor();
                return;
            }
        }

        if (triggerPrefixPattern.test(`${trigger} ${payload}`) && shouldAutoFormatJsonText(payload)) {
            const parsed = parseJsonText(payload);
            if (parsed.ok) {
                replaceEditorValue(JSON.stringify(parsed.value, null, 2));
                validateNow();
                setStatus("已格式化", "success");
                focusEditor();
                return;
            }
        }

        replaceEditorValue(payload);
        validateNow();
        focusEditor();
    };

    const bindEditorEvents = () => {
        state.editor.onDidChangeModelContent(() => {
            scheduleValidate();
        });

        state.editor.onDidChangeCursorPosition(() => {
            updateCurrentPathFromCursor();
        });

        const inputArea = editorContainer.querySelector("textarea.inputarea");
        if (inputArea) {
            inputArea.addEventListener("paste", (event) => {
                const pastedText = event.clipboardData?.getData("text");
                if (typeof pastedText !== "string" || !shouldAutoFormatJsonText(pastedText) || !state.editor) {
                    return;
                }

                const parsed = parseJsonText(pastedText);
                if (!parsed.ok) {
                    return;
                }

                event.preventDefault();
                const selections = state.editor.getSelections() || [];
                if (!selections.length) {
                    return;
                }

                state.editor.executeEdits("watools-json-paste-format", selections.map((selection) => ({
                    range: selection,
                    text: JSON.stringify(parsed.value, null, 2),
                    forceMoveMarkers: true,
                })));
                state.editor.pushUndoStop();
                validateNow();
                setStatus("已格式化", "success");
            });
        }
    };

    const configureMonaco = (monaco) => {
        monaco.languages.json.jsonDefaults.setDiagnosticsOptions({
            validate: true,
            allowComments: false,
            trailingCommas: "error",
            schemaValidation: "error",
            schemas: [],
            enableSchemaRequest: false,
        });

        state.monaco = monaco;
        state.editor = monaco.editor.create(editorContainer, {
            value: "",
            language: "json",
            theme: "vs",
            automaticLayout: true,
            minimap: {enabled: false},
            tabSize: 2,
            insertSpaces: true,
            detectIndentation: false,
            renderWhitespace: "selection",
            renderControlCharacters: true,
            bracketPairColorization: {enabled: true},
            guides: {
                bracketPairs: true,
                indentation: true,
            },
            multiCursorModifier: "alt",
            smoothScrolling: true,
            cursorSmoothCaretAnimation: "on",
            cursorBlinking: "smooth",
            scrollBeyondLastLine: false,
            wordWrap: "off",
            formatOnPaste: false,
            formatOnType: true,
            autoClosingBrackets: "always",
            autoClosingQuotes: "always",
            autoIndent: "full",
            fontSize: 15,
            lineHeight: 26,
            fontFamily: '"JetBrains Mono", "SFMono-Regular", "SF Mono", "Consolas", monospace',
            padding: {
                top: 16,
                bottom: 16,
            },
        });

        bindEditorEvents();
        validateNow();
        focusEditor();
        setStatus("");
        updateActionState();
    };

    const loadMonaco = () => new Promise((resolve, reject) => {
        if (!window.require) {
            reject(new Error("Monaco loader 未加载。"));
            return;
        }

        window.require.config({
            paths: {
                vs: new URL("./vendor/monaco/vs", window.location.href).toString(),
            },
        });

        window.require([
            "vs/editor/editor.main",
            "vs/language/json/monaco.contribution",
        ], (...modules) => {
            resolve(modules[0] || window.monaco);
        }, reject);
    });

    togglePanelButton.addEventListener("click", () => {
        togglePanel();
    });

    closePanelButton.addEventListener("click", () => {
        togglePanel(false);
    });

    formatButton.addEventListener("click", () => {
        formatCurrentJson().catch((error) => {
            setStatus(error instanceof Error ? error.message : "格式化失败", "error");
        });
    });

    compressButton.addEventListener("click", () => {
        try {
            compressCurrentJson();
        } catch (error) {
            setStatus(error instanceof Error ? error.message : "压缩失败", "error");
        }
    });

    parseQueryButton.addEventListener("click", () => {
        try {
            runParseCurrentEditorAsParams();
        } catch (error) {
            setStatus(error instanceof Error ? error.message : "转换失败", "error");
        }
    });

    copyButton.addEventListener("click", () => {
        copyEditorJson().catch((error) => {
            setStatus(error instanceof Error ? error.message : "复制失败", "error");
        });
    });

    queryButton.addEventListener("click", () => {
        try {
            runBuildQuery();
            togglePanel(true);
        } catch (error) {
            setStatus(error instanceof Error ? error.message : "生成失败", "error");
        }
    });

    clearButton.addEventListener("click", () => {
        replaceEditorValue("");
        validateNow();
        focusEditor();
    });

    copyPathButton.addEventListener("click", () => {
        writeClipboardText(currentPathInput.value).then(() => {
            setStatus("路径已复制", "success");
            showToast("已复制");
        }).catch((error) => {
            setStatus(error instanceof Error ? error.message : "复制失败", "error");
        });
    });

    usePathButton.addEventListener("click", () => {
        const value = currentPathInput.value.trim();
        if (!value) {
            return;
        }
        if (pathInput.value.trim()) {
            pathInput.value = `${pathInput.value.replace(/\s+$/, "")}\n${value}`;
        } else {
            pathInput.value = value;
        }
        updateActionState();
    });

    extractButton.addEventListener("click", () => {
        try {
            runExtraction();
        } catch (error) {
            setStatus(error instanceof Error ? error.message : "提取失败", "error");
        }
    });

    buildQueryButton.addEventListener("click", () => {
        try {
            runBuildQuery();
        } catch (error) {
            setStatus(error instanceof Error ? error.message : "生成失败", "error");
        }
    });

    copyOutputButton.addEventListener("click", () => {
        writeClipboardText(extractOutput.value).then(() => {
            setStatus("已复制", "success");
            showToast("已复制");
        }).catch((error) => {
            setStatus(error instanceof Error ? error.message : "复制失败", "error");
        });
    });

    clearOutputButton.addEventListener("click", () => {
        pathInput.value = "";
        extractOutput.value = "";
        updateActionState();
    });

    pathInput.addEventListener("input", () => {
        updateActionState();
    });

    window.addEventListener("keydown", (event) => {
        if (keyboard.match(event, "Enter", {primary: true})) {
            event.preventDefault();
            formatCurrentJson().catch((error) => {
                setStatus(error instanceof Error ? error.message : "格式化失败", "error");
            });
            return;
        }

        if (keyboard.match(event, "c", {primary: true, shift: true})) {
            event.preventDefault();
            const task = extractOutput.value.trim()
                ? writeClipboardText(extractOutput.value)
                : copyEditorJson();
            Promise.resolve(task).then(() => {
                if (extractOutput.value.trim()) {
                    setStatus("已复制", "success");
                    showToast("已复制");
                }
            }).catch((error) => {
                setStatus(error instanceof Error ? error.message : "复制失败", "error");
            });
            return;
        }

        if (keyboard.match(event, "l", {primary: true})) {
            event.preventDefault();
            replaceEditorValue("");
            validateNow();
            focusEditor();
        }
    });

    loadMonaco()
        .then((monaco) => {
            configureMonaco(monaco);
            applyHostContext(readHostContext());
            window.addEventListener("watools:context-ready", (event) => {
                applyHostContext(event.detail || readHostContext());
            });
        })
        .catch((error) => {
            setStatus(error instanceof Error ? error.message : "加载失败", "error");
        });
</script>
</body>
</html>
