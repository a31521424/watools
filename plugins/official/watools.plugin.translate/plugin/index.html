<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaTools Translate</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f6f0;
            --panel: rgba(255, 255, 255, 0.88);
            --panel-strong: rgba(255, 255, 255, 0.96);
            --line: rgba(23, 50, 39, 0.08);
            --line-strong: rgba(23, 50, 39, 0.14);
            --text: #173227;
            --muted: #6f7e77;
            --accent: #1d8a67;
            --accent-soft: rgba(29, 138, 103, 0.10);
            --danger: #b54740;
            --shadow: 0 14px 34px rgba(30, 56, 44, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(29, 138, 103, 0.10), transparent 26%),
                linear-gradient(180deg, #fbfcf8 0%, var(--bg) 100%);
            color: var(--text);
            font: 14px/1.5 "SF Pro Text", "Segoe UI", sans-serif;
            overflow: auto;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        .shell {
            min-height: 100vh;
            min-width: 920px;
            padding: 12px 16px 14px;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 10px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 0 2px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .brand h1 {
            margin: 0;
            font-size: 17px;
            font-weight: 680;
            letter-spacing: -0.01em;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 12px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: flex-end;
        }

        .ghost-button,
        .keycap {
            border: 0;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 12px;
            white-space: nowrap;
        }

        .ghost-button {
            background: rgba(23, 50, 39, 0.05);
            color: var(--muted);
            cursor: pointer;
            transition: background 120ms ease, color 120ms ease;
        }

        .ghost-button:hover {
            background: rgba(23, 50, 39, 0.08);
            color: var(--text);
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 14px;
            min-height: 0;
        }

        .pane {
            min-width: 0;
            min-height: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 8px;
        }

        .pane-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 0 2px;
        }

        .pane-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .pane-title h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 650;
        }

        .pane-title p {
            margin: 0;
            color: var(--muted);
            font-size: 12px;
        }

        .editor-wrap {
            min-height: 0;
            display: flex;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        textarea {
            width: 100%;
            flex: 1;
            min-height: 420px;
            border: 0;
            resize: none;
            padding: 18px 18px 22px;
            background: transparent;
            color: var(--text);
            line-height: 1.65;
            font-size: 15px;
            outline: none;
        }

        textarea::placeholder,
        input::placeholder {
            color: #8c9992;
        }

        .editor-wrap:focus-within,
        .settings-row:focus-within {
            border-color: var(--line-strong);
            box-shadow: 0 18px 40px rgba(30, 56, 44, 0.10), 0 0 0 3px rgba(29, 138, 103, 0.10);
        }

        .pane-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 0 2px;
        }

        .status {
            min-height: 20px;
            color: var(--muted);
            font-size: 13px;
        }

        .status.error {
            color: var(--danger);
        }

        .status.success {
            color: var(--accent);
        }

        .hint-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: flex-end;
        }

        .keycap {
            background: rgba(23, 50, 39, 0.06);
            color: var(--muted);
        }

        .mini-label {
            color: var(--muted);
            font-size: 12px;
        }

        .settings {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--panel-strong);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .settings.visible {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
        }

        .settings-copy {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .settings-copy strong {
            font-size: 13px;
            font-weight: 620;
        }

        .settings-copy span {
            color: var(--muted);
            font-size: 12px;
        }

        .settings-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            min-width: 0;
            padding: 4px;
            background: rgba(255, 255, 255, 0.74);
            border: 1px solid var(--line);
            border-radius: 14px;
        }

        .settings-row input {
            width: 100%;
            border: 0;
            outline: none;
            background: transparent;
            color: var(--text);
            padding: 8px 10px;
        }

        .primary-button {
            border: 0;
            border-radius: 12px;
            padding: 10px 14px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            transition: filter 120ms ease;
        }

        .primary-button:hover {
            filter: brightness(0.96);
        }

        .toast {
            position: fixed;
            top: 14px;
            right: 16px;
            padding: 9px 13px;
            border-radius: 999px;
            background: rgba(23, 50, 39, 0.94);
            color: #fff;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 120ms ease, transform 120ms ease;
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <div class="brand">
            <h1>Translate</h1>
            <p id="direction-label">Auto source detection, target English</p>
        </div>
        <div class="topbar-actions">
            <button id="toggle-settings" class="ghost-button" type="button">API Key</button>
        </div>
    </header>

    <main class="workspace">
        <section class="pane">
            <div class="pane-head">
                <div class="pane-title">
                    <h2>Source</h2>
                    <p id="source-meta">Paste text, then translate.</p>
                </div>
                <span class="mini-label" id="target-language-badge">Target English</span>
            </div>
            <div class="editor-wrap">
                <textarea id="source-text" spellcheck="false" placeholder="Paste or type text. Cmd/Ctrl + Enter translates."></textarea>
            </div>
            <div class="pane-foot">
                <div class="status" id="status"></div>
                <div class="hint-row">
                    <span class="keycap">Translate</span>
                    <span class="keycap">Swap</span>
                </div>
            </div>
        </section>

        <section class="pane">
            <div class="pane-head">
                <div class="pane-title">
                    <h2>Translation</h2>
                    <p id="detected-label">Detected source: -</p>
                </div>
                <span class="mini-label">Copy with shortcut</span>
            </div>
            <div class="editor-wrap">
                <textarea id="target-text" spellcheck="false" placeholder="Translation appears here." readonly></textarea>
            </div>
            <div class="pane-foot">
                <div class="status" id="result-status">Cmd/Ctrl + Shift + C to copy.</div>
                <div class="hint-row">
                    <span class="keycap">Copy</span>
                    <span class="keycap">Key</span>
                </div>
            </div>
        </section>
    </main>

    <section id="settings-panel" class="settings">
        <div class="settings-copy">
            <strong>DeepL Free API Key</strong>
            <span>Stored with WaTools plugin storage. Press Enter to save, Esc to close.</span>
        </div>
        <div class="settings-row">
            <input id="api-key-input" type="password" autocomplete="off" placeholder="Paste your DeepL Free auth key">
            <button id="save-api-key" class="primary-button" type="button">Save</button>
        </div>
    </section>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    const apiKeyStorageKey = "deepl.authKey";
    const apiKeyLocalStorageKey = "watools.plugin.translate.deepl.authKey";
    const deeplEndpoint = "https://api-free.deepl.com/v2/translate";
    const targetLanguageMeta = {
        EN: "English",
        "ZH-HANS": "Chinese",
    };

    const sourceTextNode = document.getElementById("source-text");
    const targetTextNode = document.getElementById("target-text");
    const statusNode = document.getElementById("status");
    const resultStatusNode = document.getElementById("result-status");
    const toastNode = document.getElementById("toast");
    const directionLabel = document.getElementById("direction-label");
    const detectedLabel = document.getElementById("detected-label");
    const targetLanguageBadge = document.getElementById("target-language-badge");
    const sourceMeta = document.getElementById("source-meta");
    const settingsPanel = document.getElementById("settings-panel");
    const toggleSettingsButton = document.getElementById("toggle-settings");
    const apiKeyInput = document.getElementById("api-key-input");
    const saveApiKeyButton = document.getElementById("save-api-key");

    let toastTimer = null;
    let apiKey = "";
    let lastTargetLang = "EN";
    let isTranslating = false;

    const containsChinese = (value) => /[\u3400-\u9FFF]/.test(value);
    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    const stripTriggerPrefix = (value) => {
        const trimmed = value.trim();
        if (!trimmed) {
            return "";
        }
        if (/^(fy|translate|翻译)\s+.+$/i.test(trimmed)) {
            return trimmed.replace(/^(fy|translate|翻译)\s+/i, "").trim();
        }
        if (/^(fy|translate|翻译)$/i.test(trimmed)) {
            return "";
        }
        return trimmed;
    };

    const extractSeedText = () => {
        const searchSeed = new URLSearchParams(window.location.search).get("seed");
        if (typeof searchSeed === "string" && searchSeed.trim()) {
            return stripTriggerPrefix(searchSeed);
        }
        if (typeof window.inputValue === "string" && window.inputValue.trim()) {
            return stripTriggerPrefix(window.inputValue);
        }
        return "";
    };

    const getTargetLanguage = (text) => containsChinese(text) ? "EN" : "ZH-HANS";

    const updateDirectionUI = (text) => {
        lastTargetLang = getTargetLanguage(text);
        const targetLabel = targetLanguageMeta[lastTargetLang];
        directionLabel.textContent = `Auto source detection, target ${targetLabel}`;
        targetLanguageBadge.textContent = `Target ${targetLabel}`;
        if (!text.trim()) {
            sourceMeta.textContent = "Paste text, then translate.";
            return;
        }
        sourceMeta.textContent = containsChinese(text) ? "Chinese text will be translated to English." : "Non-Chinese text will be translated to Chinese.";
    };

    const setStatus = (message, type = "info") => {
        statusNode.textContent = message || "";
        statusNode.className = type === "error" ? "status error" : type === "success" ? "status success" : "status";
    };

    const setResultStatus = (message, type = "info") => {
        resultStatusNode.textContent = message || "";
        resultStatusNode.className = type === "error" ? "status error" : type === "success" ? "status success" : "status";
    };

    const showToast = (message) => {
        toastNode.textContent = message;
        toastNode.classList.add("visible");
        if (toastTimer) {
            clearTimeout(toastTimer);
        }
        toastTimer = setTimeout(() => {
            toastNode.classList.remove("visible");
        }, 1800);
    };

    const setSettingsVisible = (visible) => {
        settingsPanel.classList.toggle("visible", visible);
        if (visible) {
            apiKeyInput.focus();
            apiKeyInput.select();
        } else {
            sourceTextNode.focus();
        }
    };

    const persistApiKey = async (value) => {
        window.localStorage.setItem(apiKeyLocalStorageKey, value);
        try {
            await window.watools.StorageSet(apiKeyStorageKey, value);
        } catch (error) {
            // Keep local fallback so the user does not have to re-enter the key.
        }
    };

    const loadApiKey = async () => {
        let storedKey = "";

        try {
            storedKey = (await window.watools.StorageGet(apiKeyStorageKey)) || "";
        } catch (error) {
            storedKey = "";
        }

        if (!storedKey) {
            storedKey = window.localStorage.getItem(apiKeyLocalStorageKey) || "";
            if (storedKey) {
                try {
                    await window.watools.StorageSet(apiKeyStorageKey, storedKey);
                } catch (error) {
                    // Keep local fallback when host storage is temporarily unavailable.
                }
            }
        }

        apiKey = typeof storedKey === "string" ? storedKey.trim() : "";
        apiKeyInput.value = apiKey;
        setSettingsVisible(!apiKey);
    };

    const waitForHostApi = async () => {
        for (let attempt = 0; attempt < 80; attempt += 1) {
            if (window.watools && window.runtime) {
                return;
            }
            await sleep(25);
        }
        throw new Error("WaTools host API is not ready");
    };

    const saveApiKey = async () => {
        const nextKey = apiKeyInput.value.trim();
        if (!nextKey) {
            setStatus("DeepL auth key is required.", "error");
            return;
        }

        apiKey = nextKey;
        await persistApiKey(apiKey);
        setStatus("API key saved.", "success");
        setResultStatus("Ready to translate.", "success");
        setSettingsVisible(false);
        showToast("DeepL key saved");

        if (sourceTextNode.value.trim()) {
            await translateText({silentEmpty: true});
        }
    };

    const translateText = async ({silentEmpty = false} = {}) => {
        const text = sourceTextNode.value.trim();
        if (!text) {
            if (!silentEmpty) {
                setStatus("Enter text to translate.", "error");
            }
            return;
        }

        if (!apiKey) {
            setStatus("Set your DeepL Free API key first.", "error");
            setSettingsVisible(true);
            return;
        }

        if (isTranslating) {
            return;
        }

        isTranslating = true;
        updateDirectionUI(text);
        setStatus("Translating...");
        setResultStatus("Waiting for DeepL...");

        try {
            const response = await window.watools.HttpProxy({
                url: deeplEndpoint,
                method: "POST",
                headers: {
                    "Authorization": `DeepL-Auth-Key ${apiKey}`,
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    text: [text],
                    target_lang: lastTargetLang,
                }),
                timeout: 30000,
            });

            if (response.status_code < 200 || response.status_code >= 300) {
                let errorPayload = null;
                if (response.body) {
                    try {
                        errorPayload = JSON.parse(response.body);
                    } catch {
                        errorPayload = null;
                    }
                }
                throw new Error(errorPayload?.message || response.error || `HTTP ${response.status_code}`);
            }

            const payload = JSON.parse(response.body || "{}");
            const translation = payload?.translations?.[0];
            if (!translation?.text) {
                throw new Error("Empty translation response");
            }

            targetTextNode.value = translation.text;
            detectedLabel.textContent = `Detected source: ${translation.detected_source_language || "AUTO"}`;
            setStatus("Translation complete.", "success");
            setResultStatus("Copy or swap with the keyboard.", "success");
        } catch (error) {
            const message = error instanceof Error ? error.message : "Translation failed";
            setStatus(message, "error");
            setResultStatus("Check API key or network response.", "error");
            if (/auth|forbidden|403|456/i.test(message)) {
                setSettingsVisible(true);
            }
        } finally {
            isTranslating = false;
        }
    };

    const copyTranslation = async () => {
        const text = targetTextNode.value.trim();
        if (!text) {
            return;
        }
        await window.runtime.ClipboardSetText(text);
        setResultStatus("Translation copied.", "success");
        showToast("Translation copied");
    };

    const swapTranslation = async () => {
        const source = sourceTextNode.value.trim();
        const target = targetTextNode.value.trim();
        if (!source || !target) {
            return;
        }

        sourceTextNode.value = target;
        targetTextNode.value = source;
        detectedLabel.textContent = "Detected source: -";
        updateDirectionUI(target);
        setStatus("Source and translation swapped.", "success");
        setResultStatus("Translating swapped text...", "success");
        showToast("Source and translation swapped");
        await translateText({silentEmpty: true});
    };

    toggleSettingsButton.addEventListener("click", () => {
        setSettingsVisible(!settingsPanel.classList.contains("visible"));
    });

    saveApiKeyButton.addEventListener("click", () => {
        void saveApiKey();
    });

    apiKeyInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault();
            void saveApiKey();
        }
        if (event.key === "Escape") {
            event.preventDefault();
            setSettingsVisible(false);
        }
    });

    sourceTextNode.addEventListener("input", () => {
        updateDirectionUI(sourceTextNode.value);
        setStatus(sourceTextNode.value.trim() ? "Press Cmd/Ctrl + Enter to translate." : "");
        if (!sourceTextNode.value.trim()) {
            targetTextNode.value = "";
            detectedLabel.textContent = "Detected source: -";
            setResultStatus("Cmd/Ctrl + Shift + C to copy.");
        }
    });

    sourceTextNode.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
            event.preventDefault();
            void translateText();
        }
    });

    window.addEventListener("keydown", (event) => {
        if (!(event.ctrlKey || event.metaKey)) {
            return;
        }

        const key = event.key.toLowerCase();
        if (key === "enter") {
            event.preventDefault();
            void translateText();
            return;
        }
        if (event.shiftKey && key === "c") {
            event.preventDefault();
            void copyTranslation();
            return;
        }
        if (event.shiftKey && key === "x") {
            event.preventDefault();
            void swapTranslation();
            return;
        }
        if (key === ",") {
            event.preventDefault();
            setSettingsVisible(true);
        }
    });

    window.addEventListener("load", async () => {
        try {
            await waitForHostApi();
            await loadApiKey();
        } catch (error) {
            const message = error instanceof Error ? error.message : "Plugin initialization failed";
            setStatus(message, "error");
            setResultStatus("Reload the plugin panel and try again.", "error");
            return;
        }

        const seedText = extractSeedText();
        sourceTextNode.value = seedText;
        updateDirectionUI(seedText);
        sourceTextNode.focus();
        sourceTextNode.setSelectionRange(seedText.length, seedText.length);

        if (seedText) {
            if (apiKey) {
                setStatus("Translating seeded text...");
                await translateText({silentEmpty: true});
            } else {
                setStatus("Set your DeepL Free API key first.", "error");
                setResultStatus("Seeded text is ready on the left.", "error");
            }
            return;
        }

        if (!apiKey) {
            setStatus("Add your DeepL Free API key to start.", "error");
            setResultStatus("Open API Key with Cmd/Ctrl + ,", "error");
            return;
        }

        setStatus("Paste text on the left. Cmd/Ctrl + Enter translates.");
    });
</script>
</body>
</html>
