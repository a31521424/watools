<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaTools 翻译</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f6fa;
            --panel: #ffffff;
            --panel-strong: #f8fbff;
            --line: rgba(28, 47, 67, 0.12);
            --text: #162433;
            --muted: #627487;
            --accent: #1968ab;
            --danger: #ac4c45;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font: 14px/1.5 "IBM Plex Sans", "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif;
            overflow: hidden;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        .app {
            height: 100%;
            overflow: auto;
            display: grid;
            grid-template-rows: auto auto minmax(0, 1fr) auto;
            gap: 12px;
            background: var(--panel-strong);
        }

        .topbar {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--line);
            background: var(--panel);
        }

        .title {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .title h1 {
            margin: 0;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .title p {
            margin: 0;
            color: var(--muted);
            font-size: 12px;
        }

        .text-button {
            border: 0;
            background: transparent;
            color: var(--muted);
            padding: 0;
            cursor: pointer;
            font-size: 12px;
        }

        .text-button:hover {
            color: var(--text);
        }

        .settings {
            display: none;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 0 14px 12px;
            border-bottom: 1px solid var(--line);
            background: var(--panel);
        }

        .settings.visible {
            display: grid;
        }

        .settings input {
            width: 100%;
            border: 1px solid var(--line);
            outline: none;
            background: var(--panel-strong);
            color: var(--text);
            padding: 10px 12px;
        }

        .settings input:focus {
            border-color: rgba(25, 104, 171, 0.4);
            box-shadow: 0 0 0 3px rgba(25, 104, 171, 0.08);
        }

        .primary-button {
            border: 0;
            padding: 10px 14px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 14px;
            min-height: 0;
            padding: 0 14px;
        }

        .pane {
            min-width: 0;
            min-height: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            gap: 8px;
        }

        .pane-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            color: var(--muted);
            font-size: 12px;
        }

        .editor-wrap {
            min-height: 0;
            display: flex;
            background: var(--panel);
            border: 1px solid var(--line);
            overflow: hidden;
        }

        .editor-wrap:focus-within {
            border-color: rgba(25, 104, 171, 0.4);
            box-shadow: 0 0 0 3px rgba(25, 104, 171, 0.08);
        }

        textarea {
            width: 100%;
            flex: 1;
            min-height: 520px;
            border: 0;
            resize: none;
            padding: 16px 16px 18px;
            background: transparent;
            color: var(--text);
            line-height: 1.68;
            font-size: 15px;
            outline: none;
        }

        textarea::placeholder,
        input::placeholder {
            color: #8c9992;
        }

        .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 14px 10px;
            border-top: 1px solid var(--line);
            background: var(--panel);
        }

        .status {
            min-height: 20px;
            color: var(--muted);
            font-size: 13px;
        }

        .status.error {
            color: var(--danger);
        }

        .status.success {
            color: var(--accent);
        }

        .hints {
            color: var(--muted);
            font-size: 12px;
            text-align: right;
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            bottom: 16px;
            right: 16px;
            padding: 9px 13px;
            border-radius: 10px;
            background: rgba(23, 50, 39, 0.94);
            color: #fff;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 120ms ease, transform 120ms ease;
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 980px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            textarea {
                min-height: 260px;
            }

            .footer {
                align-items: flex-start;
                flex-direction: column;
            }

            .hints {
                text-align: left;
                white-space: normal;
            }
        }
    </style>
</head>
<body>
<main class="app">
    <header class="topbar">
        <div class="title">
            <h1>翻译</h1>
            <p id="direction-label">自动检测源语言，目标语言为英文</p>
        </div>
        <button id="toggle-settings" class="text-button" type="button">API 密钥</button>
    </header>

    <section id="settings-panel" class="settings">
        <input id="api-key-input" type="password" autocomplete="off" placeholder="请输入 DeepL Free API 密钥">
        <button id="save-api-key" class="primary-button" type="button">保存</button>
    </section>

    <main class="workspace">
        <section class="pane">
            <div class="pane-label">
                <span>原文</span>
                <span id="source-meta">编辑后自动翻译</span>
            </div>
            <div class="editor-wrap">
                <textarea id="source-text" spellcheck="false" placeholder="粘贴或输入要翻译的文本。"></textarea>
            </div>
        </section>

        <section class="pane">
            <div class="pane-label">
                <span>译文</span>
                <span id="detected-label">检测结果 -</span>
            </div>
            <div class="editor-wrap">
                <textarea id="target-text" spellcheck="false" placeholder="翻译结果会显示在这里。" readonly></textarea>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="status" id="status"></div>
        <div class="hints">编辑后自动翻译 · Cmd/Ctrl + Enter 立即翻译 · Cmd/Ctrl + Shift + X 交换文本</div>
    </footer>
</main>

<div id="toast" class="toast"></div>

<script type="module">
    const apiKeyStorageKey = "deepl.authKey";
    const apiKeyLocalStorageKey = "watools.plugin.translate.deepl.authKey";
    const deeplEndpoint = "https://api-free.deepl.com/v2/translate";
    const targetLanguageMeta = {
        EN: "英文",
        "ZH-HANS": "简体中文",
    };

    const sourceTextNode = document.getElementById("source-text");
    const targetTextNode = document.getElementById("target-text");
    const statusNode = document.getElementById("status");
    const toastNode = document.getElementById("toast");
    const directionLabel = document.getElementById("direction-label");
    const detectedLabel = document.getElementById("detected-label");
    const sourceMeta = document.getElementById("source-meta");
    const settingsPanel = document.getElementById("settings-panel");
    const toggleSettingsButton = document.getElementById("toggle-settings");
    const apiKeyInput = document.getElementById("api-key-input");
    const saveApiKeyButton = document.getElementById("save-api-key");

    let toastTimer = null;
    let autoTranslateTimer = null;
    let apiKey = "";
    let lastTargetLang = "EN";
    let isTranslating = false;
    let latestRequestId = 0;

    const containsChinese = (value) => /[\u3400-\u9FFF]/.test(value);
    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    const stripTriggerPrefix = (value) => {
        const trimmed = value.trim();
        if (!trimmed) {
            return "";
        }
        if (/^(fy|translate|翻译)\s+.+$/i.test(trimmed)) {
            return trimmed.replace(/^(fy|translate|翻译)\s+/i, "").trim();
        }
        if (/^(fy|translate|翻译)$/i.test(trimmed)) {
            return "";
        }
        return trimmed;
    };

    const readHostContext = () => window.pluginContext || {
        input: {
            value: typeof window.inputValue === "string" ? window.inputValue : "",
            valueType: "text",
            clipboardContentType: undefined,
        },
        clipboard: null,
    };

    const extractSeedText = (context = readHostContext()) => {
        const searchSeed = new URLSearchParams(window.location.search).get("seed");
        if (typeof searchSeed === "string" && searchSeed.trim()) {
            return stripTriggerPrefix(searchSeed);
        }
        const inputValue = context?.input?.value;
        if (typeof inputValue === "string" && inputValue.trim()) {
            return stripTriggerPrefix(inputValue);
        }
        return "";
    };

    const getTargetLanguage = (text) => containsChinese(text) ? "EN" : "ZH-HANS";

    const updateDirectionUI = (text) => {
        lastTargetLang = getTargetLanguage(text);
        const targetLabel = targetLanguageMeta[lastTargetLang];
        directionLabel.textContent = `自动检测源语言，目标语言为${targetLabel}`;
        if (!text.trim()) {
            sourceMeta.textContent = "编辑后自动翻译";
            return;
        }
        sourceMeta.textContent = containsChinese(text) ? "中文译为英文" : "其他语言译为中文";
    };

    const setStatus = (message, type = "info") => {
        statusNode.textContent = message || "";
        statusNode.className = type === "error" ? "status error" : type === "success" ? "status success" : "status";
    };

    const showToast = (message) => {
        toastNode.textContent = message;
        toastNode.classList.add("visible");
        if (toastTimer) {
            clearTimeout(toastTimer);
        }
        toastTimer = setTimeout(() => {
            toastNode.classList.remove("visible");
        }, 1800);
    };

    const setSettingsVisible = (visible) => {
        settingsPanel.classList.toggle("visible", visible);
        if (visible) {
            apiKeyInput.focus();
            apiKeyInput.select();
        } else {
            sourceTextNode.focus();
        }
    };

    const persistApiKey = async (value) => {
        window.localStorage.setItem(apiKeyLocalStorageKey, value);
        try {
            await window.watools.StorageSet(apiKeyStorageKey, value);
        } catch (error) {
            // Keep local fallback so the user does not have to re-enter the key.
        }
    };

    const loadApiKey = async () => {
        let storedKey = "";

        try {
            storedKey = (await window.watools.StorageGet(apiKeyStorageKey)) || "";
        } catch (error) {
            storedKey = "";
        }

        if (!storedKey) {
            storedKey = window.localStorage.getItem(apiKeyLocalStorageKey) || "";
            if (storedKey) {
                try {
                    await window.watools.StorageSet(apiKeyStorageKey, storedKey);
                } catch (error) {
                    // Keep local fallback when host storage is temporarily unavailable.
                }
            }
        }

        apiKey = typeof storedKey === "string" ? storedKey.trim() : "";
        apiKeyInput.value = apiKey;
        setSettingsVisible(!apiKey);
    };

    const waitForHostApi = async () => {
        for (let attempt = 0; attempt < 80; attempt += 1) {
            if (window.watools && window.runtime) {
                return;
            }
            await sleep(25);
        }
        throw new Error("WaTools 宿主 API 尚未就绪");
    };

    const saveApiKey = async () => {
        const nextKey = apiKeyInput.value.trim();
        if (!nextKey) {
            setStatus("必须填写 DeepL API 密钥。", "error");
            return;
        }

        apiKey = nextKey;
        await persistApiKey(apiKey);
        setStatus("API 密钥已保存。", "success");
        setSettingsVisible(false);
        showToast("DeepL 密钥已保存");

        if (sourceTextNode.value.trim()) {
            await translateText({silentEmpty: true, immediate: true});
        }
    };

    const translateText = async ({silentEmpty = false, immediate = false} = {}) => {
        const text = sourceTextNode.value.trim();
        if (!text) {
            targetTextNode.value = "";
            detectedLabel.textContent = "检测结果 -";
            if (!silentEmpty) {
                setStatus("请输入要翻译的文本。", "error");
            } else {
                setStatus("");
            }
            return;
        }

        if (!apiKey) {
            setStatus("请先设置 DeepL Free API 密钥。", "error");
            setSettingsVisible(true);
            return;
        }

        if (isTranslating && !immediate) {
            return;
        }

        const requestId = ++latestRequestId;
        isTranslating = true;
        updateDirectionUI(text);
        setStatus(immediate ? "正在翻译……" : "正在自动翻译……");

        try {
            const response = await window.watools.HttpProxy({
                url: deeplEndpoint,
                method: "POST",
                headers: {
                    "Authorization": `DeepL-Auth-Key ${apiKey}`,
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    text: [text],
                    target_lang: lastTargetLang,
                }),
                timeout: 30000,
            });

            if (requestId !== latestRequestId) {
                return;
            }

            if (response.status_code < 200 || response.status_code >= 300) {
                let errorPayload = null;
                if (response.body) {
                    try {
                        errorPayload = JSON.parse(response.body);
                    } catch {
                        errorPayload = null;
                    }
                }
                throw new Error(errorPayload?.message || response.error || `HTTP ${response.status_code}`);
            }

            const payload = JSON.parse(response.body || "{}");
            const translation = payload?.translations?.[0];
            if (!translation?.text) {
                throw new Error("翻译接口返回了空结果");
            }

            targetTextNode.value = translation.text;
            detectedLabel.textContent = `检测结果 ${translation.detected_source_language || "AUTO"}`;
            setStatus("翻译完成。", "success");
        } catch (error) {
            if (requestId !== latestRequestId) {
                return;
            }

            const message = error instanceof Error ? error.message : "翻译失败";
            setStatus(message, "error");
            if (/auth|forbidden|403|456/i.test(message)) {
                setSettingsVisible(true);
            }
        } finally {
            if (requestId === latestRequestId) {
                isTranslating = false;
            }
        }
    };

    const queueAutoTranslate = () => {
        if (autoTranslateTimer) {
            clearTimeout(autoTranslateTimer);
        }
        autoTranslateTimer = setTimeout(() => {
            void translateText({silentEmpty: true});
        }, 420);
    };

    const copyTranslation = async () => {
        const text = targetTextNode.value.trim();
        if (!text) {
            return;
        }
        await window.runtime.ClipboardSetText(text);
        setStatus("译文已复制。", "success");
        showToast("译文已复制");
    };

    const swapTranslation = async () => {
        const source = sourceTextNode.value.trim();
        const target = targetTextNode.value.trim();
        if (!source || !target) {
            return;
        }

        sourceTextNode.value = target;
        targetTextNode.value = source;
        detectedLabel.textContent = "检测结果 -";
        updateDirectionUI(target);
        setStatus("已交换原文和译文。", "success");
        showToast("已交换");
        await translateText({silentEmpty: true, immediate: true});
    };

    toggleSettingsButton.addEventListener("click", () => {
        setSettingsVisible(!settingsPanel.classList.contains("visible"));
    });

    saveApiKeyButton.addEventListener("click", () => {
        void saveApiKey();
    });

    apiKeyInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault();
            void saveApiKey();
        }
        if (event.key === "Escape") {
            event.preventDefault();
            setSettingsVisible(false);
        }
    });

    sourceTextNode.addEventListener("input", () => {
        updateDirectionUI(sourceTextNode.value);
        if (!sourceTextNode.value.trim()) {
            if (autoTranslateTimer) {
                clearTimeout(autoTranslateTimer);
            }
            targetTextNode.value = "";
            detectedLabel.textContent = "检测结果 -";
            setStatus("");
            return;
        }
        queueAutoTranslate();
    });

    sourceTextNode.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
            event.preventDefault();
            if (autoTranslateTimer) {
                clearTimeout(autoTranslateTimer);
            }
            void translateText({immediate: true});
        }
    });

    window.addEventListener("keydown", (event) => {
        if (!(event.ctrlKey || event.metaKey)) {
            return;
        }

        const key = event.key.toLowerCase();
        if (key === "enter") {
            event.preventDefault();
            if (autoTranslateTimer) {
                clearTimeout(autoTranslateTimer);
            }
            void translateText({immediate: true});
            return;
        }
        if (event.shiftKey && key === "c") {
            event.preventDefault();
            void copyTranslation();
            return;
        }
        if (event.shiftKey && key === "x") {
            event.preventDefault();
            void swapTranslation();
            return;
        }
        if (key === ",") {
            event.preventDefault();
            setSettingsVisible(true);
        }
    });

    const applyHostContext = async (context) => {
        const seedText = extractSeedText(context);
        sourceTextNode.value = seedText;
        updateDirectionUI(seedText);
        sourceTextNode.focus();
        sourceTextNode.setSelectionRange(seedText.length, seedText.length);

        if (seedText) {
            if (apiKey) {
                setStatus("正在翻译带入的文本……");
                await translateText({silentEmpty: true, immediate: true});
            } else {
                setStatus("请先设置 DeepL Free API 密钥。", "error");
            }
            return;
        }

        if (!apiKey) {
            setStatus("请先填写 DeepL Free API 密钥后再开始使用。", "error");
            return;
        }

        setStatus("自动翻译已就绪。");
    };

    window.addEventListener("watools:context-ready", (event) => {
        void applyHostContext(event.detail || readHostContext());
    });

    window.addEventListener("load", async () => {
        try {
            await waitForHostApi();
            await loadApiKey();
        } catch (error) {
            const message = error instanceof Error ? error.message : "插件初始化失败";
            setStatus(message, "error");
            return;
        }

        await applyHostContext(readHostContext());
    });
</script>
</body>
</html>
