<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaTools 计算器</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f4ee;
            --surface: rgba(255, 255, 255, 0.72);
            --surface-hover: rgba(255, 255, 255, 0.94);
            --line: rgba(66, 45, 28, 0.1);
            --text: #2f241c;
            --muted: #7b6c5d;
            --accent: #ad5a31;
            --success: #256946;
            --danger: #b14c43;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font: 14px/1.5 "SF Pro Text", "Segoe UI", sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        .app {
            height: 100%;
            display: grid;
            grid-template-rows: auto auto auto minmax(0, 1fr) auto;
            gap: 10px;
            padding: 14px 16px 12px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
        }

        .topbar h1 {
            margin: 0;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .text-button {
            padding: 0;
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            border: 0;
            cursor: pointer;
        }

        .text-button:hover {
            color: var(--text);
        }

        .status {
            min-height: 18px;
            color: var(--muted);
            font-size: 12px;
        }

        .status.success {
            color: var(--success);
        }

        .status.error {
            color: var(--danger);
        }

        .expression-input {
            width: 100%;
            min-height: 50px;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text);
            outline: none;
            font-size: 22px;
            line-height: 1.2;
            letter-spacing: -0.03em;
        }

        .expression-input::placeholder {
            color: #9b8b7d;
        }

        .expression-input:focus {
            border-color: rgba(173, 90, 49, 0.45);
            box-shadow: 0 0 0 3px rgba(173, 90, 49, 0.08);
        }

        .history-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
        }

        .history-title {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .history-summary {
            color: var(--muted);
            font-size: 12px;
        }

        .history {
            min-height: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            gap: 8px;
        }

        .history-list {
            display: grid;
            gap: 0;
            min-height: 0;
            overflow: auto;
            border-top: 1px solid var(--line);
        }

        .history-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            grid-template-areas:
                "expression result"
                "meta meta";
            gap: 3px 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
            cursor: pointer;
        }

        .history-item:hover {
            background: var(--surface-hover);
        }

        .history-expression {
            grid-area: expression;
            font-weight: 600;
            word-break: break-word;
        }

        .history-result {
            grid-area: result;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-align: right;
        }

        .history-meta {
            grid-area: meta;
            color: var(--muted);
            font-size: 12px;
        }

        .empty {
            color: var(--muted);
            font-size: 13px;
            padding: 12px 0;
        }

        .toast {
            position: fixed;
            right: 16px;
            bottom: 16px;
            background: rgba(43, 34, 26, 0.94);
            color: #fff;
            padding: 8px 12px;
            border-radius: 10px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 120ms ease, transform 120ms ease;
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            .app {
                padding: 12px;
            }

            .expression-input {
                font-size: 20px;
                padding: 12px 13px;
            }

            .history-item {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "expression"
                    "result"
                    "meta";
            }

            .history-result {
                text-align: left;
            }
        }
    </style>
</head>
<body>
<main class="app">
    <div class="topbar">
        <h1>计算器</h1>
        <button id="clear-history-button" class="text-button" type="button">清空历史</button>
    </div>
    <div class="status" id="status">按回车键计算，点击历史记录可重新带入。</div>
    <input id="expression" class="expression-input" type="text" placeholder="示例：(2 + 3) * 4 / 5">
    <section class="history">
        <div class="history-head">
            <div class="history-title">历史记录</div>
            <div class="history-summary" id="history-summary">还没有计算记录。</div>
        </div>
        <div class="history-list" id="history-list"></div>
    </section>
    <div class="status" id="shortcut-hint">回车计算，Cmd/Ctrl+L 清空输入，Cmd/Ctrl+Shift+C 复制最新结果，Cmd/Ctrl+Shift+L 复制最新一行。</div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
    import {calculateExpression, extractExpression} from "./calculator-core.js";
    import {appendHistory, clearHistory, loadDraft, loadHistory, removeDraft, saveDraft} from "./calculator-storage.js";

    const expressionInput = document.getElementById("expression");
    const statusNode = document.getElementById("status");
    const historySummaryNode = document.getElementById("history-summary");
    const historyListNode = document.getElementById("history-list");
    const toastNode = document.getElementById("toast");
    const clearHistoryButton = document.getElementById("clear-history-button");

    let history = [];
    let latestOutcome = null;
    let toastTimer = null;

    const setStatus = (message, type = "info") => {
        statusNode.textContent = message || "";
        statusNode.className = type === "error"
            ? "status error"
            : type === "success"
                ? "status success"
                : "status";
    };

    const showToast = (message) => {
        toastNode.textContent = message;
        toastNode.classList.add("visible");
        if (toastTimer) {
            clearTimeout(toastTimer);
        }
        toastTimer = setTimeout(() => {
            toastNode.classList.remove("visible");
        }, 1800);
    };

    const copyText = async (value, successMessage) => {
        const text = String(value || "").trim();
        if (!text) {
            return false;
        }

        if (window.runtime?.ClipboardSetText) {
            await window.runtime.ClipboardSetText(text);
        } else {
            await navigator.clipboard.writeText(text);
        }

        setStatus(successMessage, "success");
        showToast(successMessage);
        return true;
    };

    const getLatestLine = () => {
        if (!latestOutcome || latestOutcome.type !== "result") {
            return "";
        }

        return `${latestOutcome.expression} = ${latestOutcome.displayValue}`;
    };

    const renderHistory = () => {
        historyListNode.innerHTML = "";

        if (!history.length) {
            historySummaryNode.textContent = "还没有计算记录。";
            historyListNode.innerHTML = '<div class="empty">历史记录会同步到 WaTools 插件存储，并镜像保存到 localStorage。</div>';
            return;
        }

        historySummaryNode.textContent = `已保存 ${history.length} 条计算记录。`;

        history.forEach((item) => {
            const row = document.createElement("div");
            row.className = "history-item";

            const expressionNode = document.createElement("div");
            expressionNode.className = "history-expression";
            expressionNode.textContent = item.expression;

            const resultNode = document.createElement("div");
            resultNode.className = "history-result";
            resultNode.textContent = `= ${item.result}`;

            const metaNode = document.createElement("div");
            metaNode.className = "history-meta";
            metaNode.textContent = new Date(item.createdAt).toLocaleString();

            row.addEventListener("click", () => {
                expressionInput.value = item.expression;
                saveDraft(item.expression);
                expressionInput.focus();
                expressionInput.select();
                setStatus("已从历史记录恢复表达式。");
            });

            row.appendChild(expressionNode);
            row.appendChild(resultNode);
            row.appendChild(metaNode);
            historyListNode.appendChild(row);
        });
    };

    const getOutcome = () => {
        const expression = expressionInput.value.trim();

        if (!expression) {
            setStatus("按回车键计算，点击历史记录可重新带入。");
            return null;
        }

        const outcome = calculateExpression(expression);
        latestOutcome = outcome.type === "result" ? outcome : latestOutcome;

        if (outcome.type === "result") {
            setStatus("按回车键可将结果保存到历史记录。");
            return outcome;
        }

        setStatus(outcome.subtitle, "error");
        return outcome;
    };

        const runCalculation = async () => {
            const outcome = getOutcome();
            if (!outcome || outcome.type !== "result") {
                return;
            }

        history = await appendHistory(outcome.expression, outcome.displayValue);
        renderHistory();
        latestOutcome = outcome;
        expressionInput.value = "";
        removeDraft();
        setStatus("已保存到历史记录。", "success");
        expressionInput.focus();
    };

    clearHistoryButton.addEventListener("click", () => {
        void clearHistory().then((nextHistory) => {
            history = nextHistory;
            renderHistory();
            showToast("历史记录已清空");
            setStatus("历史记录已清空。", "success");
        });
    });

    expressionInput.addEventListener("input", () => {
        const value = expressionInput.value.trim();
        if (value) {
            saveDraft(value);
            return;
        }

        removeDraft();
    });

    expressionInput.addEventListener("keydown", (event) => {
        const meta = event.ctrlKey || event.metaKey;

        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            void runCalculation();
            return;
        }

        if (meta && event.key.toLowerCase() === "l" && !event.shiftKey) {
            event.preventDefault();
            expressionInput.value = "";
            removeDraft();
            setStatus("表达式已清空。");
            return;
        }

        if (meta && event.key === "Enter") {
            event.preventDefault();
            void runCalculation();
        }
    });

    window.addEventListener("keydown", (event) => {
        const meta = event.ctrlKey || event.metaKey;
        if (!meta) {
            return;
        }

        const key = event.key.toLowerCase();
        if (event.shiftKey && key === "c") {
            event.preventDefault();
            if (latestOutcome && latestOutcome.type === "result") {
                void copyText(latestOutcome.displayValue, "结果已复制");
            }
            return;
        }

        if (event.shiftKey && key === "e") {
            event.preventDefault();
            const value = expressionInput.value.trim();
            if (value) {
                void copyText(value, "表达式已复制");
            }
            return;
        }

        if (event.shiftKey && key === "l") {
            event.preventDefault();
            const line = getLatestLine();
            if (line) {
                void copyText(line, "计算结果已复制");
            }
        }
    });

    window.addEventListener("load", async () => {
        const seedValue = typeof window.inputValue === "string" ? extractExpression(window.inputValue) : "";
        const draftValue = loadDraft();
        const initialValue = seedValue || draftValue;

        if (seedValue) {
            setStatus("已从命令面板带入内容。");
        } else if (draftValue) {
            setStatus("已恢复上次草稿。");
        }

        if (initialValue) {
            expressionInput.value = initialValue;
        }

        history = await loadHistory();
        renderHistory();
        expressionInput.focus();
        expressionInput.select();
    });
</script>
</body>
</html>
