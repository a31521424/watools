<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaTools Calculator</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f1e8;
            --panel: #fffdf8;
            --border: #d9cdbd;
            --text: #2f241b;
            --muted: #7a6b5f;
            --accent: #c96d31;
            --accent-dark: #8d4519;
            --success: #2f7d4a;
            --shadow: 0 18px 50px rgba(99, 66, 33, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top right, rgba(201, 109, 49, 0.14), transparent 28%),
                linear-gradient(180deg, #f8f4ed 0%, var(--bg) 100%);
            color: var(--text);
            font: 14px/1.4 "SF Pro Text", "Segoe UI", sans-serif;
        }

        .shell {
            width: 100%;
            padding: 18px;
        }

        .panel {
            width: min(100%, 860px);
            margin: 0 auto;
            background: rgba(255, 253, 248, 0.94);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .hero {
            padding: 20px 22px 14px;
            border-bottom: 1px solid rgba(217, 205, 189, 0.7);
        }

        .hero h1 {
            margin: 0;
            font-size: 26px;
        }

        .hero p {
            margin: 8px 0 0;
            color: var(--muted);
        }

        .workspace {
            display: grid;
            gap: 18px;
            padding: 18px 22px 22px;
        }

        .card {
            background: var(--panel);
            border: 1px solid rgba(217, 205, 189, 0.85);
            border-radius: 18px;
            padding: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }

        textarea,
        input,
        button {
            font: inherit;
        }

        textarea,
        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            background: #fff;
            color: var(--text);
            outline: none;
        }

        textarea:focus,
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(201, 109, 49, 0.14);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 11px 16px;
            cursor: pointer;
            transition: transform 120ms ease, opacity 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: wait;
            opacity: 0.7;
        }

        .primary {
            background: var(--accent);
            color: white;
        }

        .secondary {
            background: rgba(201, 109, 49, 0.12);
            color: var(--accent-dark);
        }

        .result {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-top: 14px;
            padding: 14px 16px;
            background: rgba(47, 125, 74, 0.08);
            border-radius: 14px;
            border: 1px solid rgba(47, 125, 74, 0.16);
        }

        .result strong {
            font-size: 24px;
        }

        .status {
            min-height: 20px;
            margin-top: 10px;
            color: var(--muted);
        }

        .status.error {
            color: #b4433f;
        }

        .history-list {
            display: grid;
            gap: 10px;
            margin-top: 8px;
        }

        .history-item {
            border: 1px solid rgba(217, 205, 189, 0.85);
            border-radius: 14px;
            padding: 12px 14px;
            background: white;
            cursor: pointer;
        }

        .history-item:hover {
            border-color: var(--accent);
        }

        .history-meta {
            color: var(--muted);
            font-size: 12px;
            margin-top: 6px;
        }

        .empty {
            color: var(--muted);
        }

        .toast {
            position: fixed;
            right: 18px;
            top: 18px;
            background: rgba(47, 36, 27, 0.94);
            color: white;
            padding: 10px 14px;
            border-radius: 999px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.16);
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 120ms ease, transform 120ms ease;
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            .shell {
                padding: 12px;
            }

            .hero,
            .workspace {
                padding-left: 14px;
                padding-right: 14px;
            }

            .result {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="panel">
        <div class="hero">
            <h1>Calculator</h1>
            <p>Evaluate an expression, copy the result, and keep a lightweight history.</p>
        </div>
        <div class="workspace">
            <div class="card">
                <label for="expression">Expression</label>
                <input id="expression" type="text" placeholder="Example: (2 + 3) * 4 / 5">
                <div class="actions">
                    <button class="primary" id="calculate-button">Calculate</button>
                    <button class="secondary" id="copy-expression-button" type="button">Copy Expression</button>
                </div>
                <div class="status" id="status"></div>
                <div class="result" id="result-card" hidden>
                    <div>
                        <div id="result-expression"></div>
                        <strong id="result-value"></strong>
                    </div>
                    <button class="secondary" id="copy-result-button" type="button">Copy Result</button>
                </div>
            </div>
            <div class="card">
                <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
                    <div>
                        <label style="margin-bottom:6px;">History</label>
                        <div class="empty" id="history-summary">No calculations yet.</div>
                    </div>
                    <button class="secondary" id="clear-history-button" type="button">Clear History</button>
                </div>
                <div class="history-list" id="history-list"></div>
            </div>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
    import {calculateExpression} from "./calculator-core.js";

    const expressionInput = document.getElementById("expression");
    const statusNode = document.getElementById("status");
    const resultCard = document.getElementById("result-card");
    const resultExpressionNode = document.getElementById("result-expression");
    const resultValueNode = document.getElementById("result-value");
    const historyListNode = document.getElementById("history-list");
    const historySummaryNode = document.getElementById("history-summary");
    const toastNode = document.getElementById("toast");
    const storageKey = "history";

    let latestResult = null;
    let history = [];
    let toastTimer = null;

    const showToast = (message) => {
        toastNode.textContent = message;
        toastNode.classList.add("visible");
        if (toastTimer) {
            clearTimeout(toastTimer);
        }
        toastTimer = setTimeout(() => {
            toastNode.classList.remove("visible");
        }, 1800);
    };

    const setStatus = (message, type = "info") => {
        statusNode.textContent = message || "";
        statusNode.className = type === "error" ? "status error" : "status";
    };

    const persistHistory = async () => {
        await window.watools.StorageSet(storageKey, history);
    };

    const renderHistory = () => {
        historyListNode.innerHTML = "";
        if (!history.length) {
            historySummaryNode.textContent = "No calculations yet.";
            return;
        }

        historySummaryNode.textContent = `${history.length} saved calculation${history.length > 1 ? "s" : ""}.`;
        history.forEach((item) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "history-item";
            button.innerHTML = `
                <div><strong>${item.expression}</strong></div>
                <div style="margin-top:4px;">= ${item.result}</div>
                <div class="history-meta">${new Date(item.createdAt).toLocaleString()}</div>
            `;
            button.addEventListener("click", () => {
                expressionInput.value = item.expression;
                expressionInput.focus();
            });
            historyListNode.appendChild(button);
        });
    };

    const loadHistory = async () => {
        const stored = await window.watools.StorageGet(storageKey);
        history = Array.isArray(stored) ? stored : [];
        renderHistory();
    };

    const pushHistory = async (expression, result) => {
        history = [{
            expression,
            result,
            createdAt: new Date().toISOString()
        }, ...history].slice(0, 50);
        await persistHistory();
        renderHistory();
    };

    const copyText = async (value, successMessage) => {
        await window.runtime.ClipboardSetText(String(value));
        showToast(successMessage);
    };

    const updateResultCard = (expression, result) => {
        resultExpressionNode.textContent = expression;
        resultValueNode.textContent = `= ${result}`;
        resultCard.hidden = false;
    };

    const calculate = async () => {
        const expression = expressionInput.value.trim();
        if (!expression) {
            setStatus("Enter an expression to calculate.", "error");
            resultCard.hidden = true;
            return;
        }

        const outcome = calculateExpression(expression);
        if (outcome.type !== "result") {
            setStatus(outcome.subtitle, "error");
            resultCard.hidden = true;
            latestResult = null;
            return;
        }

        latestResult = outcome.value;
        setStatus(outcome.subtitle);
        updateResultCard(expression, outcome.value);
        await copyText(outcome.value, "Result copied to clipboard");
        await pushHistory(expression, outcome.value);
    };

    document.getElementById("calculate-button").addEventListener("click", () => {
        void calculate();
    });

    document.getElementById("copy-expression-button").addEventListener("click", () => {
        if (!expressionInput.value.trim()) {
            return;
        }
        void copyText(expressionInput.value.trim(), "Expression copied");
    });

    document.getElementById("copy-result-button").addEventListener("click", () => {
        if (latestResult === null) {
            return;
        }
        void copyText(latestResult, "Result copied");
    });

    document.getElementById("clear-history-button").addEventListener("click", () => {
        history = [];
        void persistHistory().then(() => {
            renderHistory();
            showToast("History cleared");
        });
    });

    expressionInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault();
            void calculate();
        }
    });

    window.addEventListener("load", async () => {
        const seedValue = typeof window.inputValue === "string" ? window.inputValue.trim() : "";
        if (seedValue) {
            expressionInput.value = seedValue.replace(/^(calc|calculator|jsq|计算|计算器)\s+/i, "");
        }
        await loadHistory();
        expressionInput.focus();
    });
</script>
</body>
</html>
